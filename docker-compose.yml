# Production Docker Compose with RSA key management and service dependencies

services:
  node_template:
    build:
      context: .
      args:
        NODE_ENV: ${NODE_ENV:-production}
    command: npm run start
    restart: unless-stopped
    container_name: node_template
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      # Mount RSA keys (generated by container or external script)
      - ./kubernetes/keys:/app/keys:ro
      # Mount logs for persistence
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security configurations
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - node-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: node_template_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-defaultpassword} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - node-network

  # MySQL/MariaDB database
  # mysql:
  #   image: mariadb:11
  #   container_name: node_template_db
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
  #     MYSQL_DATABASE: ${DB_NAME:-node_template}
  #     MYSQL_USER: ${DB_USERNAME:-appuser}
  #     MYSQL_PASSWORD: ${DB_PASSWORD:-userpassword}
  #   ports:
  #     - "${DB_PORT:-3306}:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #   networks:
  #     - node-network

  # Kubernetes deployment (optional)
  kubernetes:
    image: bitnami/kubectl:latest
    depends_on:
      node_template:
        condition: service_healthy
    volumes:
      - ./kubernetes:/kubernetes:ro
      - ~/.kube:/root/.kube:ro
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kubectl apply -f /kubernetes/ || true &&
      if [ -f /kubernetes/keys/private.pem ] && [ -f /kubernetes/keys/public.pem ]; then
        kubectl create secret generic rsa-keys \
          --from-file=private-key=/kubernetes/keys/private.pem \
          --from-file=public-key=/kubernetes/keys/public.pem \
          --dry-run=client -o yaml | kubectl apply -f - || true;
      fi
      "
    networks:
      - node-network
    restart: on-failure

networks:
  node-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  # mysql_data:
  #   driver: local
