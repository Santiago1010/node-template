# Production-ready Docker Compose configuration with enhanced security and RSA key management

services:
  # Main Node.js API service
  node_template:
    build:
      context: .
      # Build arguments passed to Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}  # Default to production for security
        PORT: ${PORT:-8080}                # Configurable port with default

    # Use npm start for production (defined in package.json)
    command: npm run start

    # Restart policy: restart container on failure (production resilience)
    restart: unless-stopped

    # Container name for easy identification and networking
    container_name: node_template_api

    # Port mapping: host:container
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

    # Environment variables from .env file
    env_file:
      - .env

    # Volume mounts for persistent data and configuration
    volumes:
      # RSA keys volume - in production, this should be replaced with Kubernetes secrets
      - ./kubernetes/keys:/app/keys:ro  # Read-only mount for security
      # Application logs persistence
      - ./logs:/app/logs                # Logs directory for debugging and monitoring

    # Container health check for orchestration and load balancers
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-8080}/health || exit 1"]
      interval: 30s      # Check every 30 seconds
      timeout: 10s       # Timeout after 10 seconds
      retries: 3         # Retry 3 times before marking unhealthy
      start_period: 40s  # Grace period for application startup

    # Security configurations
    security_opt:
      - no-new-privileges:true  # Prevent privilege escalation

    # Resource limits to prevent container resource exhaustion
    deploy:
      resources:
        limits:
          memory: 1G      # Maximum memory usage
          cpus: '1.0'     # Maximum CPU usage
        reservations:
          memory: 256M    # Reserved memory
          cpus: '0.25'    # Reserved CPU

    # Connect to custom network for service isolation
    networks:
      - node-network

    # Dependencies: ensure database and cache are ready
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  # Redis cache service for session storage and application caching
  redis:
    image: redis:7-alpine
    container_name: node_template_redis

    # Redis configuration for production
    command: redis-server --requirepass ${REDIS_PASSWORD:-defaultpassword} --appendonly yes

    # Port mapping for Redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

    # Persistent volume for Redis data
    volumes:
      - redis_data:/data

    # Redis health check
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

    # Resource limits for Redis
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

    networks:
      - node-network

  # MySQL/MariaDB database service
  mysql:
    image: mariadb:11
    container_name: node_template_db

    # Environment variables for database initialization
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-node_template}
      MYSQL_USER: ${DB_USERNAME:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-userpassword}

    # Port mapping for MySQL
    ports:
      - "${DB_PORT:-3306}:3306"

    # Persistent volume for database data
    volumes:
      - mysql_data:/var/lib/mysql
      # Optional: custom MySQL configuration
      # - ./config/mysql:/etc/mysql/conf.d:ro

    # MySQL health check
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Resource limits for MySQL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

    networks:
      - node-network

  # Kubernetes deployment service (conditionally enabled)
  kubernetes:
    image: bitnami/kubectl:latest
    container_name: node_template_k8s

    # Only deploy to Kubernetes if the service is healthy
    depends_on:
      node_template:
        condition: service_healthy

    # Volume mounts for Kubernetes configuration and RSA keys
    volumes:
      - ./kubernetes:/kubernetes:ro           # Kubernetes manifests (read-only)
      - ~/.kube:/root/.kube:ro               # Kubectl configuration (read-only)

    # Kubernetes deployment commands
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Deploying to Kubernetes cluster...';

      # Apply Kubernetes manifests
      kubectl apply -f /kubernetes/ || echo 'Failed to apply manifests';

      # Create RSA keys secret in Kubernetes (production only)
      # This replaces the volume mount with proper Kubernetes secrets management
      if [ -f /kubernetes/keys/private.pem ] && [ -f /kubernetes/keys/public.pem ]; then
        echo 'Creating RSA keys secret in Kubernetes...';
        kubectl create secret generic rsa-keys \
          --from-file=private-key=/kubernetes/keys/private.pem \
          --from-file=public-key=/kubernetes/keys/public.pem \
          --dry-run=client -o yaml | kubectl apply -f - || echo 'RSA keys secret already exists';
        echo 'RSA keys secret created/updated successfully';
      else
        echo 'RSA keys not found, skipping secret creation';
      fi;

      echo 'Kubernetes deployment completed';
      "

    networks:
      - node-network

    # Restart policy: only restart on failure
    restart: on-failure

# Network configuration for service isolation
networks:
  node-network:
    driver: bridge
    # Custom network configuration for better security
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Named volumes for persistent data storage
volumes:
  # Redis data persistence
  redis_data:
    driver: local

  # MySQL data persistence
  mysql_data:
    driver: local
