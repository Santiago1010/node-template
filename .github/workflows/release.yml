name: 'Auto Version & Changelog'

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Número del Pull Request a procesar'
        required: true
        type: number
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  auto-version:
    name: 'Auto Version and Changelog Update'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: 'Set PR number depending on trigger'
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: 'Checkout PR branch'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: refs/pull/${{ steps.vars.outputs.pr_number }}/head
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Run auto-versioning script'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.vars.outputs.pr_number }}
          PR_TITLE: ${{ github.event.pull_request.title || github.event.inputs.pr_title }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels || '[]') }}
        run: node .github/scripts/auto-version.script.js

      - name: 'Commit and push changes'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain)" ]; then
            git add package.json CHANGELOG.md
            git commit -m "chore: auto-update version and changelog [skip ci]"
            git push
            echo "✅ Version and changelog updated successfully"
          else
            echo "ℹ️ No changes to commit"
          fi

      - name: 'Comment on PR'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            github.rest.issues.createComment({
              issue_number: ${{ steps.vars.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Auto-versioning completed!**

              📦 New version: \`${pkg.version}\`
              📋 Changelog and package.json have been updated automatically.

              > This PR is ready to be merged.`
            });

      - name: 'Merge PR automatically (only for manual runs)'
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.vars.outputs.pr_number }},
              merge_method: 'squash'
            });
            console.log("✅ PR merged successfully");
