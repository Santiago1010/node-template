name: 'Auto Version & Changelog'

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to process'
        required: true
        type: number
  pull_request_review:
    branches: [develop]
    types: [submitted]

jobs:
  auto-version:
    name: 'Auto Version and Changelog Update'
    # Run only when PR is approved or manually triggered
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved')
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to commit changes
      pull-requests: write  # Required for merging PRs
      actions: read
      checks: read          # Required to verify approval status

    steps:
      - name: 'Determine PR Number'
        id: set_pr_number
        run: |
          # Set PR number based on trigger type
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: 'Get PR Information'
        id: get_pr_info
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.set_pr_number.outputs.pr_number }}
            })

            console.log('PR Title:', pr.title)
            console.log('PR Body:', pr.body ? 'Present' : 'Empty')
            console.log('PR Head Branch:', pr.head.ref)
            console.log('PR Base Branch:', pr.base.ref)

            // Get PR labels
            const labels = pr.labels || []
            console.log('PR Labels:', labels.map(l => l.name).join(', '))

            // Get commits from the PR
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.set_pr_number.outputs.pr_number }}
            })

            console.log('PR Commits:', commits.length)

            core.setOutput('pr_title', pr.title)
            core.setOutput('pr_body', pr.body || '')
            core.setOutput('head_ref', pr.head.ref)
            core.setOutput('head_sha', pr.head.sha)
            core.setOutput('base_ref', pr.base.ref)
            core.setOutput('pr_labels', JSON.stringify(labels))
            core.setOutput('pr_commits', JSON.stringify(commits))

            return {
              title: pr.title,
              body: pr.body || '',
              head_ref: pr.head.ref,
              head_sha: pr.head.sha,
              base_ref: pr.base.ref,
              labels: labels,
              commits: commits
            }

      - name: 'Verify PR Approval Status'
        if: github.event_name == 'pull_request_review'
        uses: actions/github-script@v7
        id: check_approval
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.set_pr_number.outputs.pr_number }}
            })

            const hasApproval = reviews.some(review => review.state === 'APPROVED')

            if (!hasApproval) {
              core.setFailed('❌ PR has not been approved')
              return false
            }

            console.log('✅ PR is approved')
            return true

      - name: 'Checkout PR Branch'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get_pr_info.outputs.head_ref }}
          token: ${{ secrets.AUTO_VERSION_TOKEN }}
          fetch-depth: 0  # Required for version history

      - name: 'Setup Node.js Environment'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 'Install Dependencies'
        run: npm ci  # Clean install for consistency

      - name: 'Execute Auto-Versioning Script'
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_VERSION_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.set_pr_number.outputs.pr_number }}
          PR_TITLE: ${{ steps.get_pr_info.outputs.pr_title }}
          PR_BODY: ${{ steps.get_pr_info.outputs.pr_body }}
          PR_LABELS: ${{ steps.get_pr_info.outputs.pr_labels }}
          PR_COMMITS: ${{ steps.get_pr_info.outputs.pr_commits }}
        run: node .github/scripts/auto-version.script.js

      - name: 'Commit and Push Changes'
        id: commit_changes
        run: |
          # Configure git user
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Verify we're on the correct branch
          CURRENT_BRANCH=$(git branch --show-current)
          echo "Current branch: $CURRENT_BRANCH"

          if [ -z "$CURRENT_BRANCH" ]; then
            echo "❌ Error: Not on a branch (detached HEAD)"
            exit 1
          fi

          # Check for changes and commit if needed
          if [ -n "$(git status --porcelain)" ]; then
            echo "📋 Changes detected:"
            git status --short

            git add package.json CHANGELOG.md

            # Create a signed commit to comply with branch protection rules
            git commit -m "chore: auto-update version and changelog [skip ci]

            Auto-generated by GitHub Actions workflow
            PR: #${{ steps.set_pr_number.outputs.pr_number }}
            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}"

            # Push with retry mechanism
            MAX_RETRIES=3
            RETRY_COUNT=0

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if git push origin HEAD:${{ steps.get_pr_info.outputs.head_ref }}; then
                echo "✅ Version updated successfully"
                echo "changes_detected=true" >> $GITHUB_OUTPUT
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "⚠️ Push failed, retrying in 5 seconds... (attempt $RETRY_COUNT/$MAX_RETRIES)"
                  sleep 5
                  git pull --rebase origin ${{ steps.get_pr_info.outputs.head_ref }}
                else
                  echo "❌ Push failed after $MAX_RETRIES attempts"
                  exit 1
                fi
              fi
            done
          else
            echo "ℹ️ No changes detected"
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: 'Add PR Comment (When Changes Made)'
        if: steps.commit_changes.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              // Post version update notification
              const pkg = require('./package.json');
              await github.rest.issues.createComment({
                issue_number: ${{ steps.set_pr_number.outputs.pr_number }},
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Auto-versioning complete!**\n\n` +
                      `📦 New version: \`${pkg.version}\`\n` +
                      `📋 CHANGELOG.md and package.json updated\n\n` +
                      `> This PR is ready for merging.`
              });
              console.log('✅ PR comment added successfully');
            } catch (error) {
              console.error('❌ Failed to add PR comment:', error.message);
              // Don't fail the workflow for comment errors
            }

      - name: 'Merge PR (Workflow Dispatch Only)'
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              // Check if PR is still mergeable
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: ${{ steps.set_pr_number.outputs.pr_number }}
              });

              if (pr.state !== 'open') {
                throw new Error(`PR is ${pr.state}, cannot merge`);
              }

              if (pr.mergeable === false) {
                throw new Error('PR has merge conflicts');
              }

              // Merge the PR
              const { data: merge } = await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: ${{ steps.set_pr_number.outputs.pr_number }},
                commit_title: `Release: ${new Date().toISOString().split('T')[0]}`,
                commit_message: `Auto-merged after version update\n\nPR: #${{ steps.set_pr_number.outputs.pr_number }}`,
                merge_method: 'squash'
              });

              console.log('✅ PR merged successfully:', merge.sha);
            } catch (error) {
              console.error('❌ Failed to merge PR:', error.message);
              core.setFailed(`Failed to merge PR: ${error.message}`);
            }
