name: Release Automation on Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    if: github.event.review.state == 'approved' && github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: npm ci

      - name: Run release script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/release.script.js

      - name: Import GPG key
        run: |
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          echo "${GPG_KEY_ID}:6:" | gpg --batch --yes --command-fd 0 --edit-key "${GPG_KEY_ID}" trust
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Commit changes (GPG-signed)
        shell: bash
        env:
          GIT_USER: ${{ secrets.GIT_USER }}
          GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          git config user.name "${GIT_USER}"
          git config user.email "${GIT_EMAIL}"
          git config commit.gpgsign true
          git config user.signingkey "${GPG_KEY_ID}"
          git config gpg.program gpg
          
          git add package.json CHANGELOG
          git commit -m "chore: release v$(node -p "require('./package.json').version")" || echo "Nothing to commit"

          git remote set-url origin https://${GIT_USER}:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git
          git push origin HEAD:${{ github.head_ref }}
