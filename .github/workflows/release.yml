name: Release Automation

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [develop]
    
permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set PR number
        run: echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Run release script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ env.PR_NUMBER }}
        run: node scripts/release.script.js

      - name: Commit changes
        shell: bash
        env:
          GIT_USER: ${{ secrets.GIT_USER }}
          GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "${GIT_USER}"
          git config user.email "${GIT_EMAIL}"
          
          git add package.json CHANGELOG
          git commit -m "chore: release v$(node -p "require('./package.json').version")" || echo "Nothing to commit"

          git remote set-url origin https://${GIT_USER}:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git

          git push
