name: 'Auto Version & Changelog'

on:
  pull_request_review:
    types: [submitted]
    branches: [develop]

jobs:
  auto-version:
    name: 'Auto Version and Changelog Update'
    runs-on: ubuntu-latest

    # Only run if the review was approved
    if: github.event.review.state == 'approved'

    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: 'Checkout PR branch'
        uses: actions/checkout@v4
        with:
          # Checkout the PR branch, not the base branch
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Check if already processed'
        id: check_processed
        run: |
          # Check if version was already updated in this PR
          git log --oneline -n 10 | grep -q "chore: auto-update version" && echo "processed=true" >> $GITHUB_OUTPUT || echo "processed=false" >> $GITHUB_OUTPUT

      - name: 'Run auto-versioning script'
        if: steps.check_processed.outputs.processed == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: node .github/scripts/auto-version.script.js

      - name: 'Commit and push changes'
        if: steps.check_processed.outputs.processed == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Check if there are changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git add package.json CHANGELOG.md
            git commit -m "chore: auto-update version and changelog [skip ci]"
            git push
            echo "✅ Version and changelog updated successfully"
          else
            echo "ℹ️ No changes to commit"
          fi

      - name: 'Comment on PR'
        if: steps.check_processed.outputs.processed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const package = JSON.parse(fs.readFileSync('package.json', 'utf8'));

            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Auto-versioning completed!**

              📦 New version: \`${package.version}\`
              📋 Changelog and package.json have been updated automatically.

              > This PR is ready to be merged into \`develop\`.`
            });

  # Security job to prevent abuse
  security-check:
    name: 'Security Validation'
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'

    steps:
      - name: 'Validate reviewer permissions'
        uses: actions/github-script@v7
        with:
          script: |
            const reviewer = context.payload.review.user.login;

            // Get reviewer permissions
            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: reviewer
            });

            // Only allow reviewers with write+ permissions to trigger versioning
            const allowedPermissions = ['write', 'admin'];
            if (!allowedPermissions.includes(permission.permission)) {
              throw new Error(`Reviewer ${reviewer} does not have sufficient permissions`);
            }

            console.log(`✅ Reviewer ${reviewer} has ${permission.permission} permissions - proceeding`);
