name: 'CI Quality & Security Checks'

# =============================================================================
# WORKFLOW TRIGGERS
# =============================================================================
# Runs on:
# - Push to develop/main branches (direct commits)
# - Pull requests targeting develop/main branches
# =============================================================================
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# =============================================================================
# WORKFLOW PERMISSIONS
# =============================================================================
permissions:
  contents: read           # Required to checkout code
  security-events: write   # Required for CodeQL
  actions: read           # Required for workflow metadata
  checks: write           # Required to create check runs

# =============================================================================
# CONCURRENCY CONTROL
# =============================================================================
# Cancel in-progress runs for the same PR/branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # JOB 1: CODE QUALITY CHECKS
  # ===========================================================================
  # Validates code formatting and linting using Biome
  # Fails if any issues are found (no auto-fix in CI)
  # ===========================================================================
  code-quality:
    name: 'Code Quality (Biome)'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 'Install Dependencies'
        run: npm ci

      - name: 'Run Biome Check (Lint + Format)'
        run: npm run check
        continue-on-error: false

      - name: 'Quality Check Summary'
        if: success()
        run: |
          echo "✅ Code quality checks passed"
          echo "- Biome linting: PASSED"
          echo "- Code formatting: PASSED"

  # ===========================================================================
  # JOB 2: DEPENDENCY SECURITY AUDIT
  # ===========================================================================
  # Checks for known vulnerabilities in dependencies
  # Uses both npm audit and audit-ci for comprehensive scanning
  # ===========================================================================
  dependency-audit:
    name: 'Dependency Security Audit'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 'Install Dependencies'
        run: npm ci

      - name: 'Run npm audit (Production Dependencies)'
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: 'Install audit-ci'
        run: npm install -g audit-ci

      - name: 'Run audit-ci (High+ Vulnerabilities)'
        run: |
          # Create .audit-ci.json config if it doesn't exist
          cat > .audit-ci.json << 'EOF'
          {
            "high": true,
            "moderate": false,
            "low": false,
            "critical": true,
            "report-type": "summary",
            "advisories": [],
            "allowlist": [],
            "registry": "https://registry.npmjs.org"
          }
          EOF

          # Run audit-ci with config
          audit-ci --config .audit-ci.json
        continue-on-error: false

      - name: 'Audit Summary'
        if: success()
        run: |
          echo "✅ Dependency audit passed"
          echo "- npm audit: No high/critical vulnerabilities"
          echo "- audit-ci: Dependency check completed"

  # ===========================================================================
  # JOB 3: CODEQL SECURITY ANALYSIS
  # ===========================================================================
  # Advanced semantic code analysis for security vulnerabilities
  # Scans for common patterns like SQL injection, XSS, etc.
  # ===========================================================================
  codeql-analysis:
    name: 'CodeQL Security Analysis'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Initialize CodeQL'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: 'Perform CodeQL Analysis'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: 'CodeQL Summary'
        if: success()
        run: |
          echo "✅ CodeQL analysis completed"
          echo "- Language: JavaScript/Node.js"
          echo "- Query suite: security-and-quality"

  # ===========================================================================
  # JOB 4: FINAL STATUS CHECK
  # ===========================================================================
  # Aggregates all job results - required for branch protection
  # This job will only succeed if ALL previous jobs pass
  # ===========================================================================
  ci-status:
    name: 'CI Status Check'
    runs-on: ubuntu-latest
    needs: [code-quality, dependency-audit, codeql-analysis, testing]
    if: always()  # Run even if previous jobs fail

    steps:
      - name: 'Check All Jobs Status'
        run: |
          echo "📊 CI Pipeline Results:"
          echo "========================================="
          echo "  Code Quality:      ${{ needs.code-quality.result }}"
          echo "  Dependency Audit:  ${{ needs.dependency-audit.result }}"
          echo "  CodeQL Analysis:   ${{ needs.codeql-analysis.result }}"
          echo "  Testing:           ${{ needs.testing.result }}"
          echo "========================================="

          # Fail if any job failed
          if [[ "${{ needs.code-quality.result }}" != "success" ]] || \
             [[ "${{ needs.dependency-audit.result }}" != "success" ]] || \
             [[ "${{ needs.codeql-analysis.result }}" != "success" ]] || \
             [[ "${{ needs.testing.result }}" != "success" ]]; then
            echo ""
            echo "❌ CI pipeline failed"
            echo "Review the job details above for more information"
            exit 1
          fi

          echo ""
          echo "✅ All CI checks passed successfully!"
          echo "🎉 Ready for review and merge"

      - name: 'Add PR Comment (on failure)'
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Code Quality': '${{ needs.code-quality.result }}',
              'Dependency Audit': '${{ needs.dependency-audit.result }}',
              'CodeQL Analysis': '${{ needs.codeql-analysis.result }}',
              'Testing': '${{ needs.testing.result }}'
            };

            const failed = Object.entries(jobs)
              .filter(([_, status]) => status !== 'success')
              .map(([name, status]) => `- ❌ **${name}**: \`${status}\``)
              .join('\n');

            const passed = Object.entries(jobs)
              .filter(([_, status]) => status === 'success')
              .map(([name, _]) => `- ✅ **${name}**: \`success\``)
              .join('\n');

            const body = `## ⚠️ CI Pipeline Failed\n\n` +
                         `### Failed Checks\n${failed}\n\n` +
                         (passed ? `### Passed Checks\n${passed}\n\n` : '') +
                         `---\n\n` +
                         `**Next Steps:**\n` +
                         `1. Review the [workflow run details](${context.payload.repository.html_url}/actions/runs/${context.runId})\n` +
                         `2. Fix the failing checks\n` +
                         `3. Push your changes to re-trigger the CI pipeline\n\n` +
                         `💡 **Tip:** Run \`npm run check:fix\` locally to fix most issues automatically.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: 'Add PR Comment (on success)'
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ✅ CI Pipeline Passed\n\n` +
                         `All quality and security checks have passed:\n\n` +
                         `- ✅ **Code Quality**: Biome linting and formatting\n` +
                         `- ✅ **Dependency Audit**: No high/critical vulnerabilities\n` +
                         `- ✅ **CodeQL Analysis**: Security scan completed\n` +
                         `- ✅ **Testing**: Test suite executed\n\n` +
                         `---\n\n` +
                         `🎉 **This PR is ready for review!**`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
