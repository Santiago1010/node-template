      - name: 'Testing Summary'
        if: success()
        run: |
          echo "✅ Test suite passed"
          echo "- All tests executed successfully"
          echo "- Coverage report generated"
          # echo "- Coverage thresholds: MET" # Uncomment when gating is enabled

  # ===========================================================================
  # JOB 5: FINAL STATUS CHECK
  # ===========================================================================
  # Aggregates all job results - required for branch protection
  # This job will only succeed if ALL previous jobs pass
  # ===========================================================================
  ci-status:
    name: 'CI Status Check'
    runs-on: ubuntu-latest
    needs: [code-quality, dependency-audit, codeql-analysis, testing]
    if: always()  # Run even if previous jobs fail

    steps:
      - name: 'Check All Jobs Status'
        run: |
          echo "📊 CI Pipeline Results:"
          echo "  - Code Quality: ${{ needs.code-quality.result }}"
          echo "  - Dependency Audit: ${{ needs.dependency-audit.result }}"
          echo "  - CodeQL Analysis: ${{ needs.codeql-analysis.result }}"
          echo "  - Testing: ${{ needs.testing.result }}"

          # Fail if any job failed
          if [[ "${{ needs.code-quality.result }}" != "success" ]] || \
             [[ "${{ needs.dependency-audit.result }}" != "success" ]] || \
             [[ "${{ needs.codeql-analysis.result }}" != "success" ]] || \
             [[ "${{ needs.testing.result }}" != "success" ]]; then
            echo "❌ CI pipeline failed - see job details above"
            exit 1
          fi

          echo "✅ All CI checks passed successfully!"

      - name: 'Add PR Comment (on failure)'
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Code Quality': '${{ needs.code-quality.result }}',
              'Dependency Audit': '${{ needs.dependency-audit.result }}',
              'CodeQL Analysis': '${{ needs.codeql-analysis.result }}',
              'Testing': '${{ needs.testing.result }}'
            };

            const failed = Object.entries(jobs)
              .filter(([_, status]) => status !== 'success')
              .map(([name, _]) => `- ❌ ${name}`)
              .join('\n');

            const body = `## ⚠️ CI Pipeline Failed\n\n` +
                         `The following checks need attention:\n\n${failed}\n\n` +
                         `Please review the workflow run details and fix the issues.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
